trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  nodeVersion: '20.x'
  azureServiceConnection: 'azure-oralsync-conn'   # CHANGE THIS
  webAppName: 'oralsync-web-prod'                 # CHANGE THIS
  artifactName: 'react-build'

stages:
- stage: Build
  displayName: Build React Web
  jobs:
  - job: BuildWeb
    displayName: Build React App
    steps:
    - checkout: self

    - task: NodeTool@0
      displayName: Install Node.js
      inputs:
        versionSpec: '$(nodeVersion)'

    - script: npm install
      displayName: Install dependencies

    - script: npm run build
      displayName: Build React app

    - task: ArchiveFiles@2
      displayName: Archive build output
      inputs:
        rootFolderOrFile: 'build'
        includeRootFolder: false
        archiveType: zip
        archiveFile: '$(Build.ArtifactStagingDirectory)/$(artifactName).zip'
        replaceExistingArchive: true

    - task: PublishPipelineArtifact@1
      displayName: Publish build artifact
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)/$(artifactName).zip'
        artifact: '$(artifactName)'

- stage: Deploy
  displayName: Deploy React Web
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployWeb
    displayName: Deploy to Azure App Service
    environment: 'production-web'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: $(artifactName)

          - task: AzureWebApp@1
            displayName: Deploy to Azure Web App
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              appType: 'webAppLinux'
              appName: '$(webAppName)'
              package: '$(Pipeline.Workspace)/$(artifactName)/$(artifactName).zip'