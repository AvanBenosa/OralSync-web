trigger:
  branches:
    include:
      - main

pool:
  name: 'OralSyncPool'

variables:
  nodeVersion: '20.x'
  azureServiceConnection: 'azure-oralsync-conn' # CHANGE THIS
  webAppName: 'oralsync-web' # CHANGE THIS
  artifactName: 'react-build'
  buildFolder: 'build' # CHANGE TO dist IF USING VITE

stages:
  - stage: Build
    displayName: Build React Web
    jobs:
      - job: BuildWeb
        displayName: Build React App
        steps:
          - checkout: self

          - task: UseNode@1
            displayName: Install Node.js
            inputs:
              version: '$(nodeVersion)'

          - script: npm install
            displayName: Install dependencies

          - script: npm run build
            displayName: Build React app

          - powershell: |
              $requiredFiles = @(
                'build/index.html',
                'build/manifest.json',
                'build/service-worker.js',
                'build/offline.html'
              )

              $missingFiles = $requiredFiles | Where-Object { -not (Test-Path $_) }

              Write-Host 'Build root contents:'
              Get-ChildItem build | Select-Object Name, Length

              if ($missingFiles.Count -gt 0) {
                Write-Error ("Missing required PWA build files: " + ($missingFiles -join ', '))
              }
            displayName: Validate PWA build assets

          - task: ArchiveFiles@2
            displayName: Archive build output
            inputs:
              rootFolderOrFile: '$(buildFolder)'
              includeRootFolder: false
              archiveType: zip
              archiveFile: '$(Build.ArtifactStagingDirectory)/$(artifactName).zip'
              replaceExistingArchive: true

          - task: PublishPipelineArtifact@1
            displayName: Publish build artifact
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/$(artifactName).zip'
              artifact: '$(artifactName)'

  - stage: Deploy
    displayName: Deploy React Web
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployWeb
        displayName: Deploy to Azure App Service
        environment: 'production-web'
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: $(artifactName)

                - task: AzureWebApp@1
                  displayName: Deploy to Azure Web App
                  inputs:
                    azureSubscription: '$(azureServiceConnection)'
                    appType: 'webAppLinux'
                    appName: '$(webAppName)'
                    package: '$(Pipeline.Workspace)/$(artifactName)/$(artifactName).zip'
